
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.wrap{padding:1rem 0}
.search-row{display:flex;gap:8px;margin-bottom:1.25rem;align-items:center}
.search-row input{flex:1;max-width:180px;font-size:15px;padding:8px 12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary)}
.search-row button{padding:8px 16px;font-size:14px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer}
.search-row button:hover{background:var(--color-background-secondary)}
.result-card{border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);padding:1rem 1.25rem;margin-bottom:1.25rem;background:var(--color-background-primary)}
.result-card.hidden{display:none}
.zip-label{font-size:11px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--color-text-secondary);margin-bottom:4px}
.zip-headline{font-size:22px;font-weight:500;color:var(--color-text-primary);margin-bottom:2px}
.zip-sub{font-size:13px;color:var(--color-text-secondary);margin-bottom:16px}
.meter-wrap{margin-bottom:12px}
.meter-label{display:flex;justify-content:space-between;font-size:13px;color:var(--color-text-secondary);margin-bottom:6px}
.meter-track{height:8px;border-radius:4px;background:var(--color-background-tertiary);overflow:hidden}
.meter-fill{height:100%;border-radius:4px;transition:width 0.4s ease}
.grade-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:16px}
.grade-box{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px;text-align:center}
.grade-num{font-size:18px;font-weight:500;color:var(--color-text-primary)}
.grade-lbl{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.all-list{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:4px}
.zip-row{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;border-radius:var(--border-radius-md);cursor:pointer;border:0.5px solid transparent;font-size:13px;color:var(--color-text-primary)}
.zip-row:hover{background:var(--color-background-secondary);border-color:var(--color-border-tertiary)}
.zip-row .score{font-weight:500;font-size:12px;padding:2px 8px;border-radius:12px}
.section-label{font-size:11px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--color-text-secondary);margin:1.25rem 0 8px}
.city-avg-line{font-size:12px;color:var(--color-text-secondary);margin-top:8px}
.err{font-size:13px;color:var(--color-text-secondary);padding:8px 0}
</style>
<h2 class="sr-only">Austin restaurant health inspection scores by zip code — interactive lookup</h2>
<div class="wrap">
  <div class="search-row">
    <input id="zipInput" type="text" maxlength="5" placeholder="Enter zip code..." aria-label="Enter Austin zip code" />
    <button onclick="lookupZip()">Look up</button>
  </div>
  <div id="resultCard" class="result-card hidden"></div>
  <p class="section-label">Top 10 restaurant density zip codes</p>
  <div class="all-list" id="allList"></div>
  <p class="city-avg-line">City average: 90.6 &nbsp;·&nbsp; Lower score = fewer violations</p>
</div>
<script>
const CITY_AVG = 90.6;
const data = {
  "78704":{"avg":88.7,"rank":1,"density":"highest","inspections":312,"restaurants":48},
  "78745":{"avg":88.8,"rank":2,"density":"high","inspections":287,"restaurants":41},
  "78753":{"avg":88.8,"rank":3,"density":"high","inspections":298,"restaurants":43},
  "78701":{"avg":89.2,"rank":4,"density":"high","inspections":341,"restaurants":52},
  "78759":{"avg":89.4,"rank":5,"density":"high","inspections":263,"restaurants":37},
  "78752":{"avg":89.5,"rank":6,"density":"high","inspections":245,"restaurants":35},
  "78723":{"avg":90.9,"rank":7,"density":"high","inspections":234,"restaurants":33},
  "78758":{"avg":91.6,"rank":8,"density":"high","inspections":278,"restaurants":39},
  "78757":{"avg":91.6,"rank":9,"density":"high","inspections":256,"restaurants":36},
  "78660":{"avg":92.3,"rank":10,"density":"high","inspections":189,"restaurants":28},
};
function getColor(score){
  if(score<=89)return{bg:"#1A6B5A",text:"#fff"};
  if(score<=90.6)return{bg:"#4a9e80",text:"#fff"};
  if(score<=92)return{bg:"#e8a04a",text:"#fff"};
  return{bg:"#993C1D",text:"#fff"};
}
function getVerdict(score){
  if(score<=89)return{label:"Below city avg — fewer violations",icon:"✓"};
  if(score<=90.6)return{label:"Near city average",icon:"~"};
  if(score<=92)return{label:"Above city avg — more violations",icon:"↑"};
  return{label:"Well above avg — highest scrutiny",icon:"↑↑"};
}
function getMeterPct(score){
  const min=87, max=94;
  return Math.min(100,Math.max(0,((score-min)/(max-min))*100));
}
function renderCard(zip, d){
  const c=getColor(d.avg);
  const v=getVerdict(d.avg);
  const pct=getMeterPct(d.avg);
  const vs=d.avg-CITY_AVG;
  const vsStr=(vs>0?"+":"")+vs.toFixed(1);
  return `
    <div class="zip-label">Zip code</div>
    <div class="zip-headline">${zip}</div>
    <div class="zip-sub" style="color:${vs<=0?"#1A6B5A":"#993C1D"}">${v.icon} ${v.label} &nbsp;(${vsStr} vs city avg)</div>
    <div class="meter-wrap">
      <div class="meter-label"><span>Avg inspection score</span><span style="font-weight:500;color:var(--color-text-primary)">${d.avg.toFixed(1)}</span></div>
      <div class="meter-track"><div class="meter-fill" style="width:${pct}%;background:${c.bg}"></div></div>
    </div>
    <div class="grade-row">
      <div class="grade-box"><div class="grade-num">${d.avg.toFixed(1)}</div><div class="grade-lbl">Avg score</div></div>
      <div class="grade-box"><div class="grade-num">${d.inspections}</div><div class="grade-lbl">Inspections</div></div>
      <div class="grade-box"><div class="grade-num">${d.restaurants}</div><div class="grade-lbl">Restaurants</div></div>
    </div>
  `;
}
function lookupZip(){
  const zip=document.getElementById("zipInput").value.trim();
  const card=document.getElementById("resultCard");
  card.classList.remove("hidden");
  if(data[zip]){
    card.innerHTML=renderCard(zip,data[zip]);
  } else if(zip.length===5 && /^\d{5}$/.test(zip)){
    card.innerHTML=`<div class="err">Zip code ${zip} is not in the top-density Austin dataset. Check the <a href="https://data.austintexas.gov/resource/ecmv-9xxi.json" target="_blank" style="color:#1A6B5A">Austin Open Data portal</a> for full records.</div>`;
  } else {
    card.innerHTML=`<div class="err">Enter a 5-digit Austin zip code.</div>`;
  }
}
document.getElementById("zipInput").addEventListener("keydown",e=>{if(e.key==="Enter")lookupZip()});
function renderList(){
  const list=document.getElementById("allList");
  const sorted=Object.entries(data).sort((a,b)=>a[1].avg-b[1].avg);
  list.innerHTML=sorted.map(([zip,d])=>{
    const c=getColor(d.avg);
    return `<div class="zip-row" onclick="document.getElementById('zipInput').value='${zip}';lookupZip()">
      <span>${zip}</span>
      <span class="score" style="background:${c.bg};color:${c.text}">${d.avg.toFixed(1)}</span>
    </div>`;
  }).join("");
}
renderList();
</script>
